version: 2

project_name: oat

before:
  hooks:
    - go mod tidy
    - bash scripts/stage-agent-runtime.sh

builds:
  - id: oat
    main: ./cmd/oat
    binary: oat
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Root-IO-Labs/open-agent-teams/internal/cli.Version={{.Version}}

  - id: oat-agent
    main: ./cmd/oat-agent
    binary: oat-agent
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}

archives:
  - id: default
    ids:
      - oat
      - oat-agent
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - src: .release-stage/agent-runtime
        dst: agent-runtime
        info:
          mode: 0644

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: Root-IO-Labs
    name: open-agent-teams
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## OAT {{ .Tag }}

    Install via Homebrew:
    ```
    brew install Root-IO-Labs/oat/oat
    ```

    Or download a tarball below for your platform.
  footer: |
    ---
    **Full Changelog**: https://github.com/Root-IO-Labs/open-agent-teams/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: oat
    ids:
      - default
    repository:
      owner: Root-IO-Labs
      name: homebrew-oat
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Root-IO-Labs/open-agent-teams"
    description: "Open Agent Teams — coordinate teams of coding agents on real repos"
    license: "MIT"
    commit_author:
      name: oat-release-bot
      email: release@root-io-labs.invalid
    commit_msg_template: "release: {{ .ProjectName }} {{ .Tag }}"
    dependencies:
      - name: uv
      - name: python@3.12
    install: |
      libexec.install Dir["*"]
      bin.install_symlink libexec/"oat"
      bin.install_symlink libexec/"oat-agent"
    post_install: |
      cli_dir = libexec/"agent-runtime/libs/cli"
      if cli_dir.directory?
        ENV["UV_PYTHON"] = Formula["python@3.12"].opt_bin/"python3.12"
        system Formula["uv"].opt_bin/"uv", "sync", "--directory", cli_dir.to_s
      end
    test: |
      assert_match version.to_s, shell_output("#{bin}/oat --version")
      assert_match version.to_s, shell_output("#{bin}/oat-agent --version")
