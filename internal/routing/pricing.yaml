# Model pricing table — USD per million tokens.
#
# Each entry: {input_per_mtok, output_per_mtok, cache_read_per_mtok,
#              cache_creation_per_mtok, source, last_verified}
# - `input_per_mtok`: non-cached input price in USD per 1M tokens
# - `output_per_mtok`: output price in USD per 1M tokens
# - `cache_read_per_mtok`: price for cache-read tokens (often ~10% of input; omit if not supported)
# - `cache_creation_per_mtok`: price for cache-write tokens (omit to use the
#   per-provider default in CacheCreationPriceFor: anthropic 1.25× input,
#   openai 0, google 1.0× input, others 1.0× input)
# - `source`: URL where the price was sourced
# - `last_verified`: YYYY-MM-DD date someone confirmed this
# - `notes`: anything worth calling out (e.g., reasoning-token billing caveats)
#
# ⚠ THESE VALUES ARE BEST-EFFORT ESTIMATES AS OF 2026-04-23.
# Verify against each provider's pricing page before relying on the replay output.
# The replay harness multiplies these prices by actual logged token counts.
# Wrong prices → wrong cost estimates → wrong routing decisions.

