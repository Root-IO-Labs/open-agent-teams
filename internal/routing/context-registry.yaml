# Context-window registry — authoritative `max_input_tokens` per model.
#
# Rationale: the probe script's `context_profile` probe relies on LangChain's
# model.profile field, which only populates reliably for Anthropic. OpenAI's
# `/v1/models/{id}` endpoint does NOT return context_window (dead fallback in
# probe-model.py:1365-1384 — we left the code as-is pending its removal).
# Google and Ollama have no fallback at all.
#
# Downstream consumer: onboard → probe → writes `max_input_tokens: unknown` if
# not resolved. Router reads this registry as a last-resort lookup before
# accepting `unknown`. Hand-curated. Update when providers announce window changes.
#
# Schema:
#   models:
#     "<model_id>":
#       max_input_tokens: <int>
#       max_output_tokens: <int>        # optional, for future use
#       source: "<URL or note>"
#       last_verified: YYYY-MM-DD

version: 1
last_updated: 2026-04-23

models:
  # ── Anthropic ──────────────────────────────────────────────────────────
  # (Usually populated by LangChain's model.profile; listed for completeness
  # and as a failsafe if that path breaks.)
  "anthropic:claude-sonnet-4-6":
    max_input_tokens: 1000000
    max_output_tokens: 64000
    source: "https://docs.anthropic.com/en/docs/about-claude/models"
    last_verified: 2026-04-23

  "anthropic:claude-haiku-4-5":
    max_input_tokens: 200000
    max_output_tokens: 64000
    source: "https://docs.anthropic.com/en/docs/about-claude/models"
    last_verified: 2026-04-23

  # ── OpenAI (probe fallback doesn't work; registry is the source of truth) ─
  "openai:o4-mini":
    max_input_tokens: 200000
    max_output_tokens: 65536
    source: "https://platform.openai.com/docs/models"
    last_verified: 2026-04-23
    notes: "reasoning model — output tokens include chain-of-thought"

  "openai:gpt-5.4-mini":
    max_input_tokens: 400000
    max_output_tokens: 16384
    source: "https://platform.openai.com/docs/models"
