name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Code Scanning requires GitHub Advanced Security on private repos. Skip
    # (as a no-op "successful" check) until the repo is flipped public for the
    # OSS launch; at that point the job auto-activates with no further changes.
    # `github.event.repository` is unpopulated on `schedule` events, so those
    # runs are also skipped until public.
    if: ${{ github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [go, python, actions]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        if: matrix.language != 'actions'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
