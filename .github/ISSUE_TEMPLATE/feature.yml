name: Feature request
description: Suggest a new feature, enhancement, or behavioral change
title: "[feature] <short summary>"
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Why does the current behavior fall short?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen? Include API/CLI sketches if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you did not pick them.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, related issues/PRs, prior art.
